<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - Snickr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --snickr-purple: #3F0E40;
            --snickr-purple-hover: #5A165C;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .hero-card {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 1rem;
            box-shadow: 0 1rem 2rem rgba(0, 0, 0, 0.15);
        }

        .text-snickr {
            color: var(--snickr-purple) !important;
        }

        .btn-snickr {
            background-color: var(--snickr-purple);
            border-color: var(--snickr-purple);
            color: white;
            transition: all 0.2s ease-in-out;
        }

        .btn-snickr:hover, .btn-snickr:focus {
            background-color: var(--snickr-purple-hover);
            border-color: var(--snickr-purple-hover);
            color: white;
        }
    </style>
</head>
<body class="d-flex align-items-center py-4 vh-100">

<main class="container w-100 m-auto" style="max-width: 600px;">
    <div class="card hero-card p-5 text-center border-0">
        <h1 class="display-4 fw-bold text-snickr mb-3">Snickr</h1>

        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a th:href="@{/login}" class="btn btn-snickr btn-lg px-4 gap-3 fw-bold">Login</a>
            <a th:href="@{/register}" class="btn btn-outline-secondary btn-lg px-4 fw-bold">Register</a>
        </div>

        <div class="mt-5 text-muted small">
            <p class="mb-0">&copy; 2026 CS6083 Database Systems Project</p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
