<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - Snickr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .hero-card {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary vh-100">

<main class="container w-100 m-auto" style="max-width: 600px;">
    <div class="card hero-card p-5 text-center border-0">
        <h1 class="display-4 fw-bold text-primary mb-3">Snickr</h1>

        <div class="d-grid gap-3 d-sm-flex justify-content-sm-center">
            <a th:href="@{/login}" class="btn btn-primary btn-lg px-4 gap-3">Login</a>
            <a th:href="@{/register}" class="btn btn-outline-secondary btn-lg px-4">Register</a>
        </div>

        <div class="mt-5 text-muted small">
            <p>&copy; 2026 CS6083 Database Systems Project</p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
