<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Snickr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
    .form-signin {
      max-width: 400px;
      padding: 2rem;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary vh-100">

<main class="form-signin w-100 m-auto">
  <form th:action="@{/login-process}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <h1 class="h3 mb-3 fw-normal text-center text-primary fw-bold">Login</h1>

    <div th:if="${param.success}" class="alert alert-success" role="alert">
      Registration successful! Please log in with your new account.
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
      Incorrect username or password. Please try again.
    </div>

    <div th:if="${param.logout}" class="alert alert-info" role="alert">
      You have successfully logged out.
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="floatingUsername" name="username" placeholder="Username" required>
      <label for="floatingUsername">Username</label>
    </div>

    <div class="form-floating mb-4">
      <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password" required>
      <label for="floatingPassword">Password</label>
    </div>

    <button class="btn btn-primary w-100 py-2 mb-3" type="submit">Login</button>

    <div class="text-center">
      <span class="text-muted">Don't have an account yet?</span>
      <a th:href="@{/register}" class="text-decoration-none">Register</a>

      <div class="mt-3">
        <a th:href="@{/}" class="text-decoration-none text-muted small">← Return to Index</a>

      </div>
    </div>
  </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
