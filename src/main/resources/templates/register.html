<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Snickr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
    .form-signin {
      max-width: 450px;
      padding: 2rem;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 1rem;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary vh-100">

<main class="form-signin w-100 m-auto">
  <form th:action="@{/register}" method="post">
    <!-- CSRF Token -->
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <h1 class="h3 mb-3 fw-normal text-center text-primary fw-bold">Join Snickr</h1>

    <div th:if="${error}" class="alert alert-danger" role="alert">
      <span th:text="${error}"></span>
    </div>

    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="floatingEmail" name="email" placeholder="name@example.com" required>
      <label for="floatingEmail">Email</label>
    </div>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="floatingUsername" name="username" placeholder="Username" required>
      <label for="floatingUsername">Username</label>
    </div>

    <div class="form-floating mb-4">
      <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password" required>
      <label for="floatingPassword">Password</label>
    </div>

    <button class="btn btn-primary w-100 py-2 mb-3" type="submit">Register</button>

    <div class="text-center">
      <span class="text-muted">Already have an account？</span>
      <a th:href="@{/login}" class="text-decoration-none">Return to Login</a>

      <div class="mt-3">
        <a th:href="@{/}" class="text-decoration-none text-muted small">← Return to Index</a>
      </div>
    </div>
  </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
