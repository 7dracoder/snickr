<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${workspace.name} + ' - Snickr'">Workspace - Snickr</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      height: 100vh;
      overflow: hidden;
      background-color: #ffffff;
    }

    .workspace-sidebar {
      background-color: #3F0E40;
      width: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1rem;
      color: white;
      z-index: 10;
    }
    .workspace-icon-btn {
      width: 42px;
      height: 42px;
      background-color: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      color: white;
      text-decoration: none;
      margin-bottom: 12px;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .workspace-icon-btn:hover {
      background-color: rgba(255,255,255,0.3);
      color: white;
    }
    .workspace-icon-btn.active {
      border-color: white;
      background-color: rgba(255,255,255,0.25);
    }

    .channel-sidebar {
      background-color: #f8f9fa;
      width: 260px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e3e3e3;
    }
    .workspace-header {
      padding: 1rem;
      border-bottom: 1px solid #e3e3e3;
    }
    .workspace-header:hover {
      background-color: #f1f2f3;
      cursor: pointer;
    }

    .chat-main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }
    .chat-header {
      padding: 1rem;
      border-bottom: 1px solid #e3e3e3;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body class="d-flex">

<div class="workspace-sidebar shadow-sm">
  <a th:each="w : ${workspaces}"
     th:href="@{/workspaces/{id}(id=${w.workspaceId})}"
     class="workspace-icon-btn"
     th:classappend="${w.workspaceId == workspace.workspaceId} ? 'active' : ''"
     th:title="${w.name}">
    <span th:text="${#strings.substring(w.name,0,1).toUpperCase()}">W</span>
  </a>

  <a th:href="@{/dashboard}" class="workspace-icon-btn mt-auto mb-3" style="background-color: rgba(0,0,0,0.2);" title="Back to dashboard">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-house-door-fill" viewBox="0 0 16 16">
      <path d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5Z"/>
    </svg>
  </a>
</div>

<div class="channel-sidebar">
  <div class="workspace-header">
    <h5 class="fw-bold mb-0 text-dark text-truncate" th:text="${workspace.name}">Workspace Name</h5>
    <small class="text-muted" th:text="${currentUser.username}">@username</small>
  </div>

  <div class="p-3 flex-grow-1 overflow-auto">
    <div class="text-muted small fw-bold mb-2">Channels</div>
    <div class="alert alert-light border small text-muted">
      (Public and private)
    </div>

    <div class="text-muted small fw-bold mt-4 mb-2">Direct Messages</div>
    <div class="alert alert-light border small text-muted">
      (DM)
    </div>
  </div>

  <div class="p-3 border-top mt-auto bg-light">
    <form th:action="@{/workspaces/{id}/invite(id=${workspace.workspaceId})}" method="post">
      <label class="small fw-bold text-muted mb-1">Invite</label>
      <div class="input-group input-group-sm">
        <input type="email" name="email" class="form-control" required>
        <button class="btn btn-primary" type="submit">Send</button>
      </div>
      <div th:if="${param.invited}" class="text-success small mt-1">The invitation has been sent！</div>
    </form>
  </div>
</div>

<div class="chat-main">
  <div class="chat-header">
    <h5 class="mb-0 fw-bold"># channel name</h5>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
